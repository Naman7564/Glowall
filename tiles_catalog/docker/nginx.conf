# Nginx configuration for Glowall Tiles & Marble Catalog

# HTTP - redirect to HTTPS (after SSL is obtained)
server {
    listen 80;
    server_name glowall.in www.glowall.in;

    # Certbot challenge (must remain on port 80)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name glowall.in www.glowall.in;

    # SSL certificates (created by Certbot)
    ssl_certificate /etc/letsencrypt/live/glowall.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/glowall.in/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Use Docker's internal DNS resolver for dynamic resolution
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $upstream http://web:3000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Static files
    location /static/ {
        alias /app/static_root/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy to Django app
    location / {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Increase timeout for large file uploads
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # Increase max body size for file uploads
    client_max_body_size 20M;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

# Fallback for IP/localhost access (no SSL)
server {
    listen 80;
    server_name 80.225.237.255 localhost 127.0.0.1 glowall.local;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $upstream http://web:3000;

    location /static/ {
        alias /app/static_root/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    client_max_body_size 20M;
}
