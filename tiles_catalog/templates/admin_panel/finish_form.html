{% extends 'admin_panel/base_admin.html' %}

{% block title %}{{ title|default:"Add Finish" }} - Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ title|default:"Add Finish" }}</h1>
    <a href="{% url 'admin_panel:finish_list' %}" class="btn btn-outline">
        <i class="fas fa-arrow-left"></i> Back
    </a>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_name">Finish Name *</label>
            {{ form.name }}
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'admin_panel:finish_list' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
