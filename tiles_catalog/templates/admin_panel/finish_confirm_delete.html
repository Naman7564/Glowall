{% extends 'admin_panel/base_admin.html' %}

{% block title %}Delete Finish - Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Delete Finish</h1>
</div>

<div class="confirm-card">
    <div class="confirm-icon"><i class="fas fa-exclamation-triangle"></i></div>
    <h2>Are you sure you want to delete "{{ finish.name }}"?</h2>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'admin_panel:finish_list' %}" class="btn btn-outline">Cancel</a>
    </form>
</div>
{% endblock %}
