{% extends 'admin_panel/base_admin.html' %}

{% block title %}Finishes - Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Finishes</h1>
    <a href="{% url 'admin_panel:finish_add' %}" class="btn btn-primary">
        <i class="fas fa-plus"></i> Add Finish
    </a>
</div>

<div class="data-card">
    <div class="table-responsive">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Products</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for finish in finishes %}
                <tr>
                    <td><strong>{{ finish.name }}</strong></td>
                    <td>{{ finish.product_count }}</td>
                    <td>
                        <div class="action-buttons">
                            <a href="{% url 'admin_panel:finish_edit' finish.pk %}" class="btn btn-sm btn-outline">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a href="{% url 'admin_panel:finish_delete' finish.pk %}" class="btn btn-sm btn-danger">
                                <i class="fas fa-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No finishes found</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
