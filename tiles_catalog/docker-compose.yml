version: '3.8'

services:
  # Django Application
  web:
    build: .
    container_name: glowall_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECURE_COOKIES=False
      - DJANGO_ALLOWED_HOSTS=80.225.237.255,localhost,127.0.0.1
      - DJANGO_CSRF_TRUSTED_ORIGINS=http://80.225.237.255:3000,http://localhost:3000,http://127.0.0.1:3000
      - DJANGO_DB_PATH=/app/data/db.sqlite3
    volumes:
      - static_volume:/app/static_root
      - media_volume:/app/media
      - db_data:/app/data
    depends_on: []
    networks:
      - glowall_network
    expose:
      - "3000"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: glowall_nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static_root:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - glowall_network

networks:
  glowall_network:
    driver: bridge

volumes:
  static_volume:
  media_volume:
  db_data:
